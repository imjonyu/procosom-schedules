    <br><br>

    <!-- Subscribe directly in calendar app -->
    <a id="subscribe-link" href="#">Subscribe</a>

    <!-- Or download the .ics file -->
    <a id="download-link" href="#">Download .ics</a>

    
    <br><br>
    <h3>Select Season:</h3>
    <select id="season-select">
        <option value="">-- Select a season --</option>
        <option value="-1">Toutes (0)</option><option value="1">Automne 2015 (2015)</option><option value="2">Hiver 2016 (2016)</option><option value="3">Été 2016 (2016)</option><option value="4">Automne 2016 (2016)</option><option value="5">Hiver 2017 (2017)</option><option value="6">Été 2017 (2017)</option><option value="7">Automne 2017 (2017)</option><option value="8">Hiver 2018 (2018)</option><option value="9">Été 2018 (2018)</option><option value="10">Automne 2018 (2018)</option><option value="11">Hiver 2019 (2019)</option><option value="12">Été 2019 (2019)</option><option value="13">Automne 2019 (2019)</option><option value="14">Hiver 2020 (2020)</option><option value="15">Automne 2021 (2021)</option><option value="16">Hiver 2022 (2022)</option><option value="17">Automne 2022 (2022)</option><option value="18">Hiver 2023 (2023)</option><option value="19">Été 2023 (2023)</option><option value="20">Automne 2023 (2023)</option><option value="21">Hiver 2024 (2024)</option><option value="22">Automne 2024 (2024)</option><option value="23">Hiver 2025 (2025)</option><option value="24">Été 2025 (2025)</option><option value="25">Automne 2025 (2025)</option><option value="26">Hiver 2026 (2026)</option>
    </select>
    
    <br><br>
    <h3>Select Division:</h3>
    <select id="division-select">
        <option value="">-- Select a division --</option>
        <option value="126">A</option><option value="127">B</option><option value="128">C</option><option value="129">D</option><option value="130">E</option>
    </select>
    
    <script>
        const BASE_URL = "https://imjonyu.github.io/procosom-schedules/calendars/";

        document.getElementById("team-select").addEventListener("change", (e) => {
            const team = e.target.value.replace(" ", "_");
            const url = `${BASE_URL}${team}.ics`;

            // webcal:// triggers "subscribe" in calendar apps instead of download
            document.getElementById("subscribe-link").href = url.replace("https://", "webcal://");
            document.getElementById("download-link").href = url;
        });
    </script>
