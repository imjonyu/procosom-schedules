<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procosom Schedules</title>
    <link rel="stylesheet" href="style.css?v=1.0.5">
    <meta name="version" content="1.0.5">
    <script src="index2.js?v=1.0.5"></script>
</head>
<body>
    <h1>Procosom Schedules</h1>

    <div class="dropdown-container">
        <label>Season:</label>
        <div id="latest-season">Loading...</div>
    </div>

    <div class="dropdown-container">
        <label for="division">Division:</label>
        <select id="division">
            <option value="">Select Division</option>
            <option value="a">Division A</option>
            <option value="b">Division B</option>
            <option value="c">Division C</option>
            <option value="d">Division D</option>
            <option value="e">Division E</option>
        </select>
    </div>

    <div class="dropdown-container">
        <label for="teams">Teams:</label>
        <select id="teams" disabled>
            <option value="">Select Team</option>
        </select>
    </div>

    <div class="ics-display-container">
        <label for="ics-path">ICS File Path:</label>
        <input type="text" id="ics-path" class="ics-path" readonly value="Select a team to see the ICS file path" style="width: 100%;">
        <div class="ics-button-group">
            <button id="copy-ics" disabled>Copy ICS Path</button>
            <button id="subscribe-ics" disabled>Subscribe to Calendar</button>
        </div>
    </div>
    
    <div class="version-info">Version 1.0.5</div>
</body>
</html>
